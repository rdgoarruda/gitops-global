# ============================================================
# OCM POLICY APPS
# Destino: Hub (kubernetes.default.svc)
# O OCM Hub avalia as PlacementRules e distribui as políticas
# para os clusters worker correspondentes automaticamente.
# O klusterlet agent em cada worker cluster as executa.
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ocm-policies-nprod
  namespace: argocd
  labels:
    type: ocm-policy
    environment: nprod
spec:
  project: default
  source:
    repoURL: 'https://github.com/rdgoarruda/gitops-global.git'
    targetRevision: main
    path: ocm-policies/overlays/nprod
  destination:
    # Políticas aplicadas no HUB — OCM distribui para nprod-bu-x via Placement (env=nprod)
    server: https://kubernetes.default.svc
    namespace: open-cluster-management
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ocm-policies-prod
  namespace: argocd
  labels:
    type: ocm-policy
    environment: prod
spec:
  project: default
  source:
    repoURL: 'https://github.com/rdgoarruda/gitops-global.git'
    targetRevision: main
    path: ocm-policies/overlays/prod
  destination:
    # Políticas aplicadas no HUB — OCM distribui para prod-bu-x via Placement (env=prod)
    server: https://kubernetes.default.svc
    namespace: open-cluster-management
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
