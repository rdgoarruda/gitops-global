# ============================================================
# OCM POLICY APPS
# Destino: Hub (kubernetes.default.svc)
# Cada app gerencia políticas em seu próprio namespace no Hub,
# garantindo isolamento total e evitando conflitos no ArgoCD.
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ocm-policies-nprod
  namespace: argocd
  labels:
    type: ocm-policy
    environment: nprod
spec:
  project: default
  source:
    repoURL: 'https://github.com/rdgoarruda/gitops-global.git'
    targetRevision: main
    path: ocm-policies/overlays/nprod
  destination:
    server: https://kubernetes.default.svc
    namespace: ocm-policies-nprod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ocm-policies-prod
  namespace: argocd
  labels:
    type: ocm-policy
    environment: prod
spec:
  project: default
  source:
    repoURL: 'https://github.com/rdgoarruda/gitops-global.git'
    targetRevision: main
    path: ocm-policies/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: ocm-policies-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
