# ============================================================
# OCM INFRA APPS (Placements and Namespaces)
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ocm-infra-nprod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/rdgoarruda/gitops-global.git'
    targetRevision: main
    path: ocm-policies/infra/nprod
  destination:
    server: https://kubernetes.default.svc
    namespace: ocm-policies-nprod
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ocm-infra-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/rdgoarruda/gitops-global.git'
    targetRevision: main
    path: ocm-policies/infra/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: ocm-policies-prod
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
---
