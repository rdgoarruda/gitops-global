apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ocm-governance-prod
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - category: platform
          - category: security
          - category: observability
  template:
    metadata:
      name: 'ocm-policy-{{category}}-prod'
    spec:
      project: default
      source:
        repoURL: 'https://github.com/rdgoarruda/gitops-global.git'
        targetRevision: main
        path: 'ocm-policies/governance/{{category}}/overlays/prod'
      destination:
        server: https://kubernetes.default.svc
        namespace: ocm-policies-prod
      syncPolicy:
        automated: { prune: true, selfHeal: true }
        syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
