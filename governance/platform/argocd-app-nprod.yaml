apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ocm-policy-platform-nprod
  namespace: argocd
  labels:
    category: platform
    environment: nprod
spec:
  project: default
  source:
    repoURL: 'https://github.com/rdgoarruda/gitops-global.git'
    targetRevision: main
    path: governance/platform/overlays/nprod
  destination:
    server: https://kubernetes.default.svc
    namespace: ocm-policies-nprod
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
