apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ocm-config-nprod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"       # executa antes do ApplicationSet de políticas
    argocd.argoproj.io/sync-options: "Prune=false"  # root-app nunca deleta esta Application automaticamente
spec:
  project: default
  source:
    repoURL: 'https://github.com/rdgoarruda/gitops-global.git'
    targetRevision: main
    path: config/nprod
  destination:
    server: https://kubernetes.default.svc
    namespace: ocm-policies-nprod
  syncPolicy:
    automated:
      prune: false      # deleções de recursos OCM exigem confirmação manual (Sync + Prune na UI)
      selfHeal: true
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
