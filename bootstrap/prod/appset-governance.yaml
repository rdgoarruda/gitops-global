apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: governance-prod
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: 'https://github.com/rdgoarruda/gitops-global.git'
        revision: main
        directories:
          - path: governance/*/overlays/prod
  template:
    metadata:
      name: 'ocm-policy-{{path.basename}}-prod'
      annotations:
        argocd.argoproj.io/sync-wave: "0"     # executa após ocm-config-prod (wave -1)
      labels:
        category: '{{path.basename}}'
        environment: prod
    spec:
      project: default
      source:
        repoURL: 'https://github.com/rdgoarruda/gitops-global.git'
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: ocm-policies-prod
      syncPolicy:
        automated: {prune: true, selfHeal: true}
        syncOptions: [CreateNamespace=true, ServerSideApply=true]
